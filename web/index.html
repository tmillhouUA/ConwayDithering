<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway Dither</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'><rect width='10' height='10' fill='black'/><rect x='2' y='2' width='2' height='2' fill='white'/><rect x='6' y='2' width='2' height='2' fill='white'/><rect x='4' y='4' width='2' height='2' fill='white'/><rect x='2' y='6' width='2' height='2' fill='white'/><rect x='6' y='6' width='2' height='2' fill='white'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Conway Dither</h1>
    <p class="subtitle">Evolve your image through Conway's Game of Life</p>
  </header>

  <main>
    <div id="uploadArea">
      <label for="fileInput">
        <span id="uploadLabel">Upload a grayscale image to begin</span>
        <input type="file" id="fileInput" accept="image/*" disabled>
      </label>
      <p id="statusText">Loading WASM...</p>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="controls">
      <p id="progress"></p>
      <button id="downloadBtn" disabled>Download Result</button>
    </div>
  </main>

  <script src="coordinator.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
